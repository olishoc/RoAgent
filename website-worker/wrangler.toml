name = "rblxagent-site"
main = "src/index.ts"
compatibility_date = "2026-05-16"

routes = [
  { pattern = "rblxagent.com/*", zone_name = "rblxagent.com" },
  { pattern = "www.rblxagent.com/*", zone_name = "rblxagent.com" }
]

[vars]
# Temporarily close with:
# PUBLIC_DOWNLOADS = "false"
PUBLIC_DOWNLOADS = "true"
POLAR_PRODUCT_ID = "7f09de97-45f6-4ed0-96bd-f9bb449b7248"
POLAR_SUCCESS_URL = "https://rblxagent.com/download?checkout_id={CHECKOUT_ID}"
RESEND_FROM = "RblxAgent <support@rblxagent.com>"
WINDOWS_DAEMON_URL = "https://github.com/olishoc/RoAgent/releases/download/v3.0.0-rc.8/studiolink-daemon.exe"
WINDOWS_DAEMON_SHA256 = "9527fc5ae93d1b0fa543608b440260c49add3f0fd297d8379d090c40cf04842a"
WINDOWS_DAEMON_SIZE = "158130760"

